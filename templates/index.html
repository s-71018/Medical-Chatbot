<!DOCTYPE html>
<html>
<head>
    <title>AI Medical Chatbot</title>
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: auto; padding: 20px; background: #f4f7f6; }
        .section { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h3 { border-bottom: 2px solid #3498db; padding-bottom: 5px; color: #2c3e50; }
        .select2-container { width: 100% !important; }
    </style>
</head>
<body>
    <form action="/get_consultation" method="POST">
        <div class="section">
            <h3>1. Physical Symptoms</h3>
            <select class="symptom-select" name="symptoms" multiple="multiple">
                {% for s in physical %}
                    <option value="{{ s }}">{{ s.replace('_', ' ').title() }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="section">
            <h3>2. Medical & Social History</h3>
            {% for s in history %}
                <label style="display: block;"><input type="checkbox" name="symptoms" value="{{ s }}"> {{ s.replace('_', ' ').title() }}</label>
            {% endfor %}
        </div>

        <div class="section">
            <h3>3. Observed Signs/Lab Findings</h3>
            <select class="symptom-select" name="symptoms" multiple="multiple">
                {% for s in lab %}
                    <option value="{{ s }}">{{ s.replace('_', ' ').title() }}</option>
                {% endfor %}
            </select>
        </div>

        <input type="submit" value="Analyze Symptoms" style="width: 100%; padding: 15px; background: #2ecc71; color: white; border: none; font-size: 1.1em; cursor: pointer; border-radius: 5px;">
    </form>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <script>
        $(document).ready(function() {
            $('.symptom-select').select2({ placeholder: "Search symptoms..." });
        });
    </script>
</body>
</html>
